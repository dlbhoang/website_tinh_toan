<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="stator-gradient" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:0.8" />
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="400" fill="#f3f4f6"/>
  <!-- Outer stator -->
  <circle cx="200" cy="200" r="180" fill="url(#stator-gradient)" stroke="#1e40af" stroke-width="2"/>
  <!-- Stator slots -->
  <g id="slots">
    <line x1="200" y1="25" x2="200" y2="60" stroke="#3b82f6" stroke-width="6" stroke-linecap="round"/>
    <line x1="293" y1="33" x2="317" y2="57" stroke="#3b82f6" stroke-width="6" stroke-linecap="round"/>
    <line x1="345" y1="85" x2="360" y2="100" stroke="#3b82f6" stroke-width="6" stroke-linecap="round"/>
    <line x1="367" y1="155" x2="375" y2="200" stroke="#3b82f6" stroke-width="6" stroke-linecap="round"/>
    <line x1="345" y1="315" x2="360" y2="300" stroke="#3b82f6" stroke-width="6" stroke-linecap="round"/>
    <line x1="293" y1="367" x2="317" y2="343" stroke="#3b82f6" stroke-width="6" stroke-linecap="round"/>
    <line x1="200" y1="375" x2="200" y2="340" stroke="#3b82f6" stroke-width="6" stroke-linecap="round"/>
  </g>
  <!-- Rotor/Core -->
  <circle cx="200" cy="200" r="110" fill="#e5e7eb" stroke="#6b7280" stroke-width="2"/>
  <circle cx="200" cy="200" r="100" fill="#f9fafb"/>
  <!-- Rotor slots -->
  <circle cx="200" cy="280" r="8" fill="#6b7280"/>
  <circle cx="280" cy="200" r="8" fill="#6b7280"/>
  <circle cx="200" cy="120" r="8" fill="#6b7280"/>
  <circle cx="120" cy="200" r="8" fill="#6b7280"/>
  <!-- Labels -->
  <text x="200" y="220" font-size="14" font-weight="bold" text-anchor="middle" fill="#374151">Stator Cross-Section</text>
  <text x="60" y="30" font-size="11" fill="#6b7280">a: Slot Width</text>
  <text x="310" y="30" font-size="11" fill="#6b7280">b: Slot Width</text>
  <text x="200" y="50" font-size="11" fill="#6b7280">d1: Core Diameter</text>
</svg>